# GitHub Actions PR reviewer: reports lint/type findings inline and runs safety checks.
# Works on GitHub Free; does not use Copilot cloud.
name: PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: write

jobs:
  pr-review:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Set up reviewdog
        uses: reviewdog/action-setup@v1

      - name: Run flake8 with reviewdog
        env:
          REVIEWDOG_GITHUB_API_TOKEN: ${{ github.token }}
        run: |
          python -m flake8 . 2>&1 | reviewdog \
            -efm="%f:%l:%c: %m" \
            -name="flake8" \
            -reporter="github-pr-review" \
            -filter-mode="diff_context" \
            -fail-level="error"

      - name: Run mypy with reviewdog
        env:
          REVIEWDOG_GITHUB_API_TOKEN: ${{ github.token }}
        run: |
          python -m mypy . 2>&1 | reviewdog \
            -efm="%f:%l: %m" \
            -name="mypy" \
            -reporter="github-pr-review" \
            -filter-mode="diff_context" \
            -fail-level="error"

      - name: Run bandit
        run: python -m bandit -r . -q

      - name: Run pytest
        run: python -m pytest -q
